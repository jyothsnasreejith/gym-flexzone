
[functions.dashboard]
enabled = true
verify_jwt = true
import_map = "./functions/dashboard/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/dashboard/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/dashboard/*.html" ]

[functions.send-email]
enabled = true
verify_jwt = false
entrypoint = "./functions/send-email/index.ts"

[functions.convert-enquiry]
enabled = true
verify_jwt = true
entrypoint = "./functions/convert-enquiry/index.ts"

[functions.send-notifications]
enabled = true
verify_jwt = true
entrypoint = "./functions/send-notifications/index.ts"
